site_name: PAL - Online Documentation

nav:
  - Home: index.md
  - Understanding PAL: understanding-pal.md
  - Getting Started: getting-started.md
  - Use Cases: use-cases.md
  - Concepts:
    - Peers and Logs: concepts/peers-and-logs.md
    - Remote Procedure Calls: concepts/rpc.md
    - Interception: concepts/interception.md
    - RPC Policy: concepts/rpc-policy.md
    - Recording Scope: concepts/recording-scope.md
    - Log Backends: concepts/logs.md
  - Guides:
    - Local Development: guides/local-development.md
    - JVM Configuration: guides/jvm-configuration.md
    - Deterministic Replay: guides/deterministic-replay.md
    - Distributed Application: guides/distributed-application.md
    - Testing with Interception: guides/testing-with-interception.md
    - Writing Callback Handlers: guides/writing-callback-handlers.md
  - CLI Reference: cli-reference.md

theme:
  name: material
  language: en
  logo: assets/imgs/PAL-logo-01.png
  palette:
    - scheme: default
      primary: cyan
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: cyan
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: 'Roboto'
    code: 'Roboto Mono'
  features:
    - content.code.copy
    - content.code.annotate
    - content.code.select

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra:
  favicons:
    - { rel: 'apple-touch-icon', sizes: '180x180', href: 'apple-touch-icon.png' }
    - { rel: 'icon', type: 'image/png', sizes: '32x32', href: 'assets/imgs/favicon-32x32.png' }
    - { rel: 'icon', type: 'image/png', sizes: '16x16', href: 'assets/imgs/favicon-16x16.png' }
    - { rel: 'manifest', href: 'site.webmanifest' }
    - { rel: 'mask-icon', href: 'assets/imgs/safari-pinned-tab.svg', color: '#5bbad5' }
  msapplication_config: 'browserconfig.xml'
  theme_color: '#ffffff'
  analytics:
    provider: google
    property: G-QE77GLRLF2
