image: maven:3-openjdk-17

services:
  - name: docker:dind

variables:
  # Docker-in-Docker
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""              # disable autogenerated TLS
  DOCKER_DRIVER: overlay2             # optional (defaults to overlay2 now)

  # Maven
  MAVEN_OPTS: >
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=WARN
    -Dorg.slf4j.simpleLogger.showDateTime=true
    -Djava.awt.headless=true
  MAVEN_CLI_OPTS: >
    --batch-mode --errors --fail-at-end --show-version
    -DinstallAtEnd=true
    -DdeployAtEnd=true

  # Custom
  SKIP_NON_DEPLOY: "false"

stages:
  - build
  - unit-tests
  - integration-tests
  - publish-artifacts
  - build_docs
  - deploy_docs

cache:
  paths:
    - .m2/repository

clean-install:
  stage: build
  script:
    - mvn $MAVEN_CLI_OPTS clean install -DskipTests
  artifacts:
    paths:
      - lib/
      - modules/*/target/**
    expire_in: 1h
  rules:
    - if: $SKIP_NON_DEPLOY == "true"
      when: never
    - when: on_success

unit-tests:
  stage: unit-tests
  script:
    - mvn $MAVEN_CLI_OPTS test
  rules:
    - if: $SKIP_NON_DEPLOY == "true"
      when: never
    - when: on_success
  artifacts:
    when: on_failure
    paths:
      - logs/
      - modules/*/logs/**

integration-tests:
  stage: integration-tests
  variables:
    FF_NETWORK_PER_BUILD: 1
    PAL_DIRECTORY: 'etcd:2379'
    KAFKA_SERVERS: 'kafka:9092'

    # etcd env variables
    NAME: default
    ETCD_INITIAL_ADVERTISE_PEER_URLS: 'http://etcd:2380'
    ETCD_LISTEN_PEER_URLS: 'http://0.0.0.0:2380'
    ETCD_ADVERTISE_CLIENT_URLS: 'http://etcd:2379'
    ETCD_LISTEN_CLIENT_URLS: 'http://0.0.0.0:2379'
    ETCD_INITIAL_CLUSTER: 'default=http://etcd:2380'

    # kafka env variables
    KAFKA_NODE_ID: 1
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
    KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_NUM_PARTITIONS: 1
  services:
    - name: $CI_REGISTRY/quasient/pal/etcd:latest
      alias: etcd
      command: ["./etcd"]
    - name: apache/kafka:3.8.0
      alias: kafka
  script:
    - export PAL_HOME=$(pwd)
    - export PAL_VERSION=$(grep '<version>' pom.xml | head -1 | sed -E 's/.*<version>(.+)<\/version>.*/\1/')
    - export ITT_APPS_JAR=$CI_PROJECT_DIR/.m2/repository/com/quasient/pal/itt-apps/$PAL_VERSION/itt-apps-$PAL_VERSION.jar
    - export PATH=$PATH:./bin
    - peer4itts &
    - mvn $MAVEN_CLI_OPTS verify -DskipUTs
  artifacts:
    when: on_failure
    paths:
      - modules/itt/target/failsafe-reports/
      - modules/itt/logs/
      - logs/
  rules:
    - if: $SKIP_NON_DEPLOY == "true"
      when: never
    - when: on_success

publish-pal-image:
  stage: publish-artifacts
  image: python:3.9
  tags:
    - dind
  script:
    - export PAL_VERSION=$(grep '<version>' pom.xml | head -1 | sed -E 's/.*<version>(.+)<\/version>.*/\1/')
    - export PAL_JAR=$CI_PROJECT_DIR/.m2/repository/com/quasient/pal/pal/$PAL_VERSION/pal-$PAL_VERSION.jar
    - export PAL_HOME="$CI_PROJECT_DIR"
    - echo "PAL_HOME is $PAL_HOME"
    - pip install --no-cache-dir ansible requests
    - ansible-galaxy collection install community.docker --force
    - |
      echo "=== Running the Ansible playbook ==="
      ansible-playbook infra/ansible/playbooks/build_and_push_pal_image.yml
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $SKIP_NON_DEPLOY != "true"
      when: on_success
    - when: never


deploy-pal:
  stage: publish-artifacts
  script:
    - mvn deploy -s ci_settings.xml -DskipTests
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $SKIP_NON_DEPLOY != "true"
      when: on_success
    - when: never

build_docs:
  stage: build_docs
  image: python:3.9
  before_script:
    - cd docs/online
    - pip install --upgrade pip
  script:
    - pip install mkdocs mkdocs-material
    - mkdocs build
  artifacts:
    paths:
      - docs/online/site/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never

deploy_docs:
  stage: deploy_docs
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - cp "$DOCS_SSH_PRIVATE_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo -e "Host $DOCS_SSH_HOST\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config
  script:
    - rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" docs/online/site/ $DOCS_SSH_USER@$DOCS_SSH_HOST:$REMOTE_DOCS_PATH
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
