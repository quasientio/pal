name: Task
title: ""
about: Create a standalone development task (bug fix, feature, enhancement)
labels: []
body:
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      description: What type of task is this?
      options:
        - feature
        - bug
        - enhancement
        - test
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: Describe the task in detail...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Background information or motivation for this task
      placeholder: Why is this needed? What problem does it solve?

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this task is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: context_files
    attributes:
      label: Context Files (Optional)
      description: |
        Embed specific files in the developer prompt. Edit the paths below or delete unused lines.
        These are HTML comments (invisible when rendered) that control which files the agent sees.
      value: |
        <!-- context: path/to/add-file.md -->
        <!-- context: -path/to/remove-file.md -->
      placeholder: |
        <!-- context: docs/ARCHITECTURE.md -->     Add to config defaults
        <!-- context: -README.md -->               Remove from config defaults
        <!-- context-only: docs/SPECIFIC.md -->    Replace ALL defaults (use sparingly)
