name: Task
title: ""
about: Create a standalone development task (bug fix, feature, enhancement)
labels: []
body:
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      description: What type of task is this?
      options:
        - feature
        - bug
        - enhancement
        - test
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: Describe the task in detail...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Background information or motivation for this task
      placeholder: Why is this needed? What problem does it solve?

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this task is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
