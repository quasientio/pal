syntax = "proto2";
package messages.protobuf;

option java_package = "net.ittera.pal.messages.protobuf";
option optimize_for = SPEED;

enum InternalHeaderType {
    /*
     Sent before dispatching a received message.
     Value is the UUID of the receiving-dispatching peer, not the producer.
    */
    WRITE_AHEAD = 1;
    INCOMING_INTERCEPT_REQ = 2;
}

message InternalHeader {
    required InternalHeaderType headerType = 1;
    optional string value = 2;
}


