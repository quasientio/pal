syntax = "proto2";
package messages.protobuf;

import "exec.proto";
import "intercepts.proto";

option java_package = "net.ittera.pal.messages.protobuf";
option optimize_for = SPEED;

message Message {
    oneof content {
        ExecMessage execMessage = 1;
        InterceptMessage interceptMessage = 2;
        InterceptReply interceptReply = 3;
        InterceptKeyMessage interceptKeyMessage = 4;
    }
}
