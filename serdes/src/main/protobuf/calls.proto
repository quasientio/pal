syntax = "proto2";
package messages.protobuf;

import "primitives.proto";
import "ctxt.proto";

option java_package = "net.ittera.pal.messages.protobuf";
option optimize_for = SPEED;

message ConstructorCall {
    required Class class = 1;

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 2;

    repeated Parameter parameter = 3;

    optional Context context = 4;

    //TO DO:  annotations
}

message InstanceMethodCall {

    required Class class = 1;

    //method name
    required string name = 2;

    //target object
    oneof target {
        Object object = 3;
        string objectRef = 4;
    }

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 5;

    repeated Parameter parameter = 6;

    optional Context context = 7;

    //TO DO:  annotations
    //TO DO:  exception types?
}

message ClInitCall {
    required Class class = 1;

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 2;

    optional Context context = 3;

    //TO DO:  annotations
}

message ClassMethodCall {
    required Class class = 1;

    //method name
    required string name = 2;

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 3;

    repeated Class exceptionType = 4;

    repeated Parameter parameter = 5;

    optional Context context = 6;

    //TO DO:  annotations
    //TO DO:  exception types?
}

