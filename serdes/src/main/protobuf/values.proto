syntax = "proto2";
package messages.protobuf;

import "primitives.proto";

option java_package = "net.ittera.pal.messages.protobuf";
option optimize_for = SPEED;

message ReturnValue {
    optional bool isVoid = 1 [default = false];

    optional bool isClass = 2 [default = false];

    optional Object object = 3;

    // the method/constructor returning this object
    optional Reflectable from = 4;

    // the class returning this object through a fieldop, constructor or method (i.e. the declaring class)
    optional Class clazz = 5;
}
