syntax = "proto2";
package messages.protobuf;

import "exec.proto";

option java_package = "net.ittera.pal.messages.protobuf";
option optimize_for = SPEED;

enum InterceptType {
    BEFORE = 1;
    AFTER = 2;
    AROUND = 3;
    BEFORE_ASYNC = 4;
    AFTER_ASYNC = 5;
}

enum FieldOpType {
    GET = 1;
    PUT = 2;
}

message InterceptableMethod {
    required string name = 1;
    repeated string parameterType = 2;
}

message InterceptableField {
    required string name = 1;
    required FieldOpType type = 2;
}

message InterceptMessage {
    required string peerUuid = 1;
    required string messageUuid = 2;
    required InterceptType type = 3;
    required string clazz = 4;
    oneof interceptable {
        InterceptableField field = 5;
        InterceptableMethod method = 6;
    }
    required string callbackClass = 7;
    required string callbackMethod = 8;
}

message InterceptKeyMessage {
    required string clazz = 1;
    required ExecMessageType msgType = 2;
    required string executableName = 3;
    repeated string parameterType = 4;
}

message InterceptReply {
    required string peerUuid = 1;
    required string followingUuid = 2;
    required bool result = 3;
}
