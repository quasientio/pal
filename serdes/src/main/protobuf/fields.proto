syntax = "proto2";
package messages.protobuf;

import "primitives.proto";
import "ctxt.proto";

option java_package = "net.ittera.pal.messages.protobuf";
option optimize_for = SPEED;

message StaticFieldGet {

    required Class class = 1;

    required Field field = 2;

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 3;

    optional Context context = 4;

    //TODO:  annotations
}

message StaticFieldPut {

    required Class class = 1;

    required Field field = 2;

    oneof value {
        Object valueObject = 3;
        string valueObjectRef = 4;
    }

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 5;

    optional Context context = 6;

    //TODO:  annotations
}

message StaticFieldPutDone {
    //TODO from here all should be replaced by reference to originator StaticFieldPut message

    //redundant if field->class is set
    required Class class = 1;

    required Field field = 2;

    optional string staticFieldPutUuid = 3;
}

message InstanceFieldGet {

    required Class class = 1;

    //target object
    oneof target {
        Object object = 2;
        string objectRef = 3;
    }

    required Field field = 4;

    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 5;

    optional Context context = 6;

    //TODO:  annotations
}

message InstanceFieldPut {

    required Class class = 1;

    //target object
    oneof target {
        Object object = 2;
        string objectRef = 3;
    }

    required Field field = 4;

    oneof value {
        Object valueObject = 5;
        string valueObjectRef = 6;
    }
    //The modifiers can be decoded with the Modifier class
    optional int32 modifiers = 7;

    optional Context context = 8;

    //TODO:  annotations

}

message InstanceFieldPutDone {

    //TODO from here all should be replaced by reference to originator InstanceFieldPut message

    //redundant if field->class is set
    required Class class = 1;

    required Field field = 2;

    optional string instanceFieldPutUuid = 3;
}
