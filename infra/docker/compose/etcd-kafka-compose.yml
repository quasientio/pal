###################################################################
# etcd-kafka-compose.yml
#
# Usage
#   # .env must define KAFKA_PORT, KAFKA_HOST_PORT, KAFKA_CONTROLLER_PORT,
#   # ETCD_CLIENT_PORT, ETCD_PEER_PORT, and optionally
#   # KAFKA_JMX_PORT, KAFKA_DATA_DIR
#
#   docker compose --project-directory "$PAL_HOME" \
#                  -f etcd-kafka-compose.yml up
###################################################################

networks:
  pal:
    external: true

services:
  #################################################################
  #  etcd
  #################################################################
  etcd:
    image: etcd:latest
    networks: [pal]
    ports:
      - "${ETCD_CLIENT_PORT}:${ETCD_CLIENT_PORT}"
      - "${ETCD_PEER_PORT}:${ETCD_PEER_PORT}"
    command:
      - ./etcd
      - -name
      - default
      - -initial-advertise-peer-urls
      - "http://etcd:${ETCD_PEER_PORT}"
      - -listen-peer-urls
      - "http://0.0.0.0:${ETCD_PEER_PORT}"
      - -advertise-client-urls
      - "http://etcd:${ETCD_CLIENT_PORT}"
      - -listen-client-urls
      - "http://0.0.0.0:${ETCD_CLIENT_PORT}"
      - -initial-cluster
      - "default=http://etcd:${ETCD_PEER_PORT}"

  #################################################################
  #  kafka  (single-node KRaft, broker+controller)
  #################################################################
  kafka:
    image: apache/kafka:3.8.0
    networks: [pal]

    # ----------------------------------------------------------------
    # Ports: 9092 for containers, 29092 for host access
    # ----------------------------------------------------------------
    ports:
      - "${KAFKA_PORT}:${KAFKA_PORT}"
      - "${KAFKA_HOST_PORT}:${KAFKA_HOST_PORT}"

    environment:
      # KRaft roles
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:${KAFKA_CONTROLLER_PORT}"

      # Listeners (no spaces!)
      KAFKA_LISTENERS: >
        PLAINTEXT://0.0.0.0:${KAFKA_PORT},
        PLAINTEXT_HOST://0.0.0.0:${KAFKA_HOST_PORT},
        CONTROLLER://0.0.0.0:${KAFKA_CONTROLLER_PORT}
      KAFKA_ADVERTISED_LISTENERS: >
        PLAINTEXT://kafka:${KAFKA_PORT},
        PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT,
        CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Single-node tuning
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1

    ulimits:
      nofile:
        soft: 1024
        hard: 1024

