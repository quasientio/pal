# overrides/etcd-kafka-compose.yml
#
# Mount a host directory (KAFKA_DATA_DIR) into the container and tell kafka
# to use it as its data store—purely through env-vars, no extra flags.
services:
  kafka:
    volumes:
      - "${KAFKA_DATA_DIR}:/var/lib/kafka/data"
    environment:
      KAFKA_LOG_DIRS: /var/lib/kafka/data
