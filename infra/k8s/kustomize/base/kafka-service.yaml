apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    # single listener used by both in-cluster pods and host clients
    - name: external
      port: 29092          # service port
      targetPort: 29092    # containerPort
      nodePort: 30092      # host-facing NodePort
