#--------------------------------------------------------
# This deployment assumes 192.168.49.2 is the Minikube-IP
#--------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 29092          # EXTERNAL (NodePort to host)
            - containerPort: 9093           # CONTROLLER (internal)
          env:
            # ── single-node KRaft settings ────────────────────────────────────
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            # ── listeners (NO spaces) ─────────────────────────────────────────
            - name: KAFKA_LISTENERS
              value: "EXTERNAL://0.0.0.0:29092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "EXTERNAL://192.168.49.2:30092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: EXTERNAL               # <-- override default (PLAINTEXT)
            # ── single-node replicas / partitions ─────────────────────────────
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_NUM_PARTITIONS
              value: "1"
            # ── data dir maps to our volume ───────────────────────────────────
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          livenessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 29092
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
      restartPolicy: Always
      volumes:
        - name: kafka-data
          #persistentVolumeClaim:
          #  claimName: kafka-pvc
          emptyDir: {}           # ⇨ for dev: ephemeral; swap to PVC for prod
