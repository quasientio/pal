apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app: kafka
spec:
  type: NodePort
  selector:
    app: kafka
  ports:
    # ── broker listener for in-cluster clients ───────────────────────
    - name: plaintext
      port: 9092
      targetPort: 9092
      nodePort: 30092          # host-facing
    # ── broker listener for host-side tools (NodePort 30093) ─────────
    - name: host
      port: 29092
      targetPort: 29092
      nodePort: 30093          # host-facing
