spec:
  ports:
    - name: "2379"
      port: 2379
      targetPort: 2379
    - name: "2380"
      port: 2380
      targetPort: 2380
  selector:
    io.kompose.service: etcd


apiVersion: v1
kind: Service
metadata:
  name: etcd
  labels:
    app: etcd
spec:
  type: NodePort          # or ClusterIP if you don't need host-side access
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
      targetPort: 2379
      nodePort: 32379
    - name: peer
      port: 2380
      targetPort: 2380
