# zmq properties
in.router=tcp://*:5671
in.dealer=inproc://deal
out.cell=inproc://cell
out.pub=inproc://pub
in.log=tcp://*:9999


# kafka properties
kafkaTopic=test.data
bootstrap.servers=localhost:9092
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=com.ittera.cometa.concentrator.messages.protobuf.KafkaSerializer
pollTimeout=100
enable.auto.commit=true
auto.commit.interval.ms=500
auto.offset.reset=earliest
session.timeout.ms=30000
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=com.ittera.cometa.concentrator.messages.protobuf.KafkaDeserializer

# executor properties
corePoolSize=0
maximumPoolSize=500
keepAliveSeconds=60
