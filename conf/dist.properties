# zmq properties
in.router=tcp://127.0.0.1:5671
#in.router=ipc://router.ipc
in.log=tcp://*:9999
in.dealer=inproc://deal
out.cell=inproc://cell
out.pub=inproc://pub


# kafka properties
kafkaTopic=test.data
bootstrap.servers=localhost:9092
key.serializer=org.apache.kafka.common.serialization.StringSerializer
value.serializer=com.ittera.cometa.concentrator.messages.protobuf.KafkaSerializer
pollTimeout=100
enable.auto.commit=true
auto.commit.interval.ms=500
auto.offset.reset=earliest
session.timeout.ms=30000
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=com.ittera.cometa.concentrator.messages.protobuf.KafkaDeserializer

# executor properties
corePoolSize=30
maximumPoolSize=100
keepAliveSeconds=60
