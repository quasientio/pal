syntax = "proto2";
package messages.protobuf.data;

import "primitives.proto";

option java_package = "com.ittera.cometa.messages.protobuf.data";
option java_outer_classname = "Values";
option optimize_for = SPEED;

message ReturnValue {
    optional bool isVoid = 1 [default = false];

    optional bool isClass = 2 [default = false];

    optional Object object = 3;

    optional Class clazz = 4;
}

