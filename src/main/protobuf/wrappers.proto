package messages.data;

import "calls.proto";
import "fields.proto";
import "exceptions.proto";
import "values.proto";

option java_package = "com.ittera.cometa.distributor.messages.data";
option optimize_for = SPEED;

message DataMessage {
    required string msgType = 1;
    required int64 threadId = 2 [default = -1];
    optional int64 following = 3;

    oneof calltype {
        ConstructorCall constructorCall = 4;
        InstanceMethodCall instanceMethodCall = 5;
        ClassMethodCall classMethodCall = 6;
        ClInitCall clinitCall = 7;
        StaticFieldGet staticFieldGet = 8;
        StaticFieldPut staticFieldPut = 9;
        InstanceFieldGet instanceFieldGet = 10;
        InstanceFieldPut instanceFieldPut = 11;
        StaticFieldPutDone staticFieldPutDone = 12;
        InstanceFieldPutDone instanceFieldPutDone = 13;
    }

    oneof returntype {
        RaisedThrowable raisedThrowable = 14;
        ReturnValue returnValue = 15;
    }
}