package messages.data;

import "calls.proto";
import "fields.proto";

option java_package = "com.ittera.cometa.distributor.messages.data";
option optimize_for = SPEED;

message DataMessage {
    required string msgType = 1;

    oneof calltype {
       ConstructorCall constructorCall = 2;
       InstanceMethodCall instanceMethodCall = 3;
       ClassMethodCall classMethodCall = 4;
       ClInitCall clinitCall = 5;
       StaticFieldGet staticFieldGet = 6;
       StaticFieldPut staticFieldPut = 7;
       InstanceFieldGet instanceFieldGet = 8;
       InstanceFieldPut instanceFieldPut = 9;
    }
}