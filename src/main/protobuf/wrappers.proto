package messages.data;

import "calls.proto";
import "fields.proto";
import "exceptions.proto";
import "values.proto";

option java_package = "com.ittera.cometa.distributor.messages.data";
option optimize_for = SPEED;

message DataMessage {
    required string msgType = 1;
    required int64 threadId = 2 [default = -1];

    oneof calltype {
        ConstructorCall constructorCall = 3;
        InstanceMethodCall instanceMethodCall = 4;
        ClassMethodCall classMethodCall = 5;
        ClInitCall clinitCall = 6;
        StaticFieldGet staticFieldGet = 7;
        StaticFieldPut staticFieldPut = 8;
        InstanceFieldGet instanceFieldGet = 9;
        InstanceFieldPut instanceFieldPut = 10;
        RaisedThrowable raisedThrowable = 11;
        ReturnValue returnValue = 12;
        StaticFieldPutDone staticFieldPutDone = 13;
        InstanceFieldPutDone instanceFieldPutDone = 14;
    }
}