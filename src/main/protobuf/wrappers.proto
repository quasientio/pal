syntax = "proto2";
package messages.protobuf.data;

import "calls.proto";
import "fields.proto";
import "exceptions.proto";
import "values.proto";

option java_package = "com.ittera.cometa.concentrator.messages.protobuf.data";
option optimize_for = SPEED;

message DataMessage {
    //TO DO:  IP or hostname for this Concentrator
    required string concentratorUuid = 1;
    required string messageUuid = 2;
    required string msgType = 3;
    required int64 threadId = 4 [default = -1];
    required int64 currentTime = 5;
    optional int64 builderSeq = 6;
    optional int64 following = 7;

    oneof content {
        ConstructorCall constructorCall = 8;
        InstanceMethodCall instanceMethodCall = 9;
        ClassMethodCall classMethodCall = 10;
        ClInitCall clinitCall = 11;
        StaticFieldGet staticFieldGet = 12;
        StaticFieldPut staticFieldPut = 13;
        InstanceFieldGet instanceFieldGet = 14;
        InstanceFieldPut instanceFieldPut = 15;
        StaticFieldPutDone staticFieldPutDone = 16;
        InstanceFieldPutDone instanceFieldPutDone = 17;
        RaisedThrowable raisedThrowable = 18;
        ReturnValue returnValue = 19;
    }
}