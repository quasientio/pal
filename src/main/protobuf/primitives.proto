package messages.data;

option java_package = "com.ittera.cometa.distributor.messages.data";
option optimize_for = SPEED;

message Value {
    optional string value = 1;
    optional int32 hash = 2;
    required int32 identityHash = 3;
    optional string class = 4;
    optional bool trimmed = 5 [default = false];
}

