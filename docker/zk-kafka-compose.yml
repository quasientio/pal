###################################################################
# zk-kafka-compose.yml
#
# CMD's (from `docker` dir):   docker-compose --project-directory .. -f zk-kafka-compose.yml up/config
###################################################################

version: '3.7'

services:
  zookeeper:
    image: wurstmeister/zookeeper:latest
    network_mode: "host"

  kafka:
    image: wurstmeister/kafka:2.12-2.3.0
    depends_on:
      - zookeeper
    network_mode: "host"
    environment:
      HOSTNAME_COMMAND: "docker info | grep '^ *Name:' | tr -d ' ' | cut -d ':' -f 2"
      JMX_PORT: ${KAFKA_JMX_PORT}
      KAFKA_LISTENERS: INSIDE://:${KAFKA_INSIDE_PORT},OUTSIDE://:${KAFKA_OUTSIDE_PORT}
      KAFKA_ADVERTISED_LISTENERS: INSIDE://:${KAFKA_INSIDE_PORT},OUTSIDE://_{HOSTNAME_COMMAND}:${KAFKA_OUTSIDE_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_ZOOKEEPER_CONNECT: localhost:${ZOOKEEPER_LISTEN_PORT}
