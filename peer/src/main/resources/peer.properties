# ZMQ PROPERTIES
ZMQ_LINGER=1000
ZMQ_RCVHWM=10000
ZMQ_SNDHWM=10000

# KAFKA PROPERTIES
kafkaTopic=app
key.serializer=net.ittera.pal.messages.protobuf.KafkaKeySerializer
value.serializer=net.ittera.pal.messages.protobuf.KafkaSerializer
pollDuration=10
enable.auto.commit=true
auto.commit.interval.ms=500
auto.offset.reset=earliest
session.timeout.ms=30000
key.deserializer=net.ittera.pal.messages.protobuf.KafkaKeyDeserializer
value.deserializer=net.ittera.pal.messages.protobuf.KafkaDeserializer

# PEER PROPERTIES
log.corePoolSize=3
log.maximumPoolSize=50
log.keepAliveSeconds=60
log.registerReplies=false