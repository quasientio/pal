# Context-level ZMQ PROPERTIES
ZMQ_LINGER=1000
ZMQ_RCVHWM=10000
ZMQ_SNDHWM=10000

# KAFKA PROPERTIES
pollDuration=10
enable.auto.commit=false
auto.commit.interval.ms=500
auto.offset.reset=earliest
session.timeout.ms=30000
key.deserializer=com.quasient.pal.serdes.kafka.KafkaKeyDeserializer
value.deserializer=com.quasient.pal.serdes.kafka.KafkaMessageDeserializer

# LOG PROPERTIES
log.threadPoolSize=1

# WAL Queue and WalWriter (queue sizes must be powers of 2)
wal.queue.type = chunked
wal.queue.initial = 16384
wal.queue.max    = 1048576
wal.queue.chunk  = 4096
# wal.kafka.bootstrap_servers =
wal.kafka.linger_ms = 25
wal.kafka.batch_size = 128000
wal.kafka.compression_type = zstd
wal.kafka.buffer_memory = 128000000

pub.queue.type = chunked
pub.queue.initial = 16384
pub.queue.max    = 1048576
pub.queue.chunk  = 8192

# MESSAGE PUBLISHER
pub.spsc_size = 524288
pub.batch_size = 4096
pub.flush_on_close = true
pub.zmq.linger = 0
pub.zmq.send_timeout = 0
pub.zmq.send_hwm = 10000
pub.drop.policy = drop_old
pub.drop.hwm_pct = 97
pub.drop.keep_pct = 92
